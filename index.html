<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>家計簿</title>
  <meta name="theme-color" content="#f7f3ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家計簿" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');
    :root {
      --bg:#f7f3ee; --bg2:#f0ebe3; --bg3:#e8e0d4;
      --surface:#fff; --border:#ddd6cb;
      --text:#3a3028; --text2:#7a6e62; --text3:#b0a494;
      --accent:#8b6f4e; --accent2:#c4956a;
      --green:#5a8a6a; --green-bg:#eaf3ec;
      --red:#b05a5a; --red-bg:#f8edec;
      --warn:#c47a2a; --warn-bg:#fdf3e3;
      --shadow:rgba(100,70,40,0.10);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);max-width:420px;margin:0 auto;overflow-x:hidden;}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
    input,button{-webkit-appearance:none;}

    .ambient{position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(180,140,90,.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(120,160,110,.06) 0%,transparent 55%);pointer-events:none;z-index:0;}
    .app{position:relative;z-index:1;}

    /* Header */
    .header{padding:52px 24px 0;}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
    .header-sub{font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;}
    .header-title{font-size:26px;font-weight:900;letter-spacing:-.5px;color:var(--text);}
    .header-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(139,111,78,.25);cursor:pointer;}

    /* Month */
    .month-selector{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding:10px 16px;background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);}
    .month-btn{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:4px 8px;}
    .month-label{font-size:15px;font-weight:700;color:var(--text);}

    /* Balance */
    .balance-card{margin-top:16px;padding:22px;background:linear-gradient(135deg,var(--accent),#6b4f35);border-radius:18px;box-shadow:0 6px 24px rgba(139,111,78,.28);position:relative;overflow:hidden;}
    .balance-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05);}
    .balance-label{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:2px;margin-bottom:8px;}
    .balance-amount{font-size:34px;font-weight:900;letter-spacing:-1px;color:#fff;}
    .balance-amount.positive{color:#c8f0d4;}
    .balance-amount.negative{color:#ffc8c8;}
    .balance-row{display:flex;gap:20px;margin-top:14px;align-items:center;}
    .balance-divider{width:1px;background:rgba(255,255,255,.2);align-self:stretch;}
    .balance-item-label{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:3px;}
    .balance-income{font-size:15px;font-weight:700;color:#c8f0d4;}
    .balance-expense{font-size:15px;font-weight:700;color:#ffc8c8;}

    /* Alert */
    .alert-banner{margin-top:12px;padding:12px 16px;background:var(--warn-bg);border-radius:12px;border:1px solid rgba(196,122,42,.3);display:flex;align-items:flex-start;gap:10px;}
    .alert-banner.hidden{display:none;}
    .alert-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
    .alert-text{font-size:12px;color:var(--warn);font-weight:700;line-height:1.5;}
    .alert-sub{font-size:11px;color:var(--text2);font-weight:400;}

    /* Tabs */
    .tabs{display:flex;padding:16px 24px 0;gap:6px;}
    .tab-btn{flex:1;padding:8px 0;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:12px;cursor:pointer;transition:all .2s;background:var(--surface);color:var(--text3);}
    .tab-btn.active{background:rgba(139,111,78,.12);color:var(--accent);font-weight:700;border-color:rgba(139,111,78,.25);}

    .content{padding:16px 24px 120px;}

    /* Entry */
    .entry-item{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:8px;background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px var(--shadow);}
    .entry-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .entry-icon.income{background:var(--green-bg);}
    .entry-icon.expense{background:var(--red-bg);}
    .entry-icon.top-cat{box-shadow:0 0 0 2px var(--accent2);}
    .entry-info{flex:1;min-width:0;}
    .entry-cat{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .entry-memo{font-size:11px;color:var(--text3);margin-left:6px;font-weight:400;}
    .entry-date{font-size:11px;color:var(--text3);}
    .entry-amount{font-size:15px;font-weight:700;flex-shrink:0;}
    .entry-amount.income{color:var(--green);}
    .entry-amount.expense{color:var(--red);}
    .entry-delete{background:none;border:none;color:var(--border);cursor:pointer;font-size:15px;padding:0 0 0 4px;flex-shrink:0;}

    /* Section title */
    .sec-title{font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:14px;text-transform:uppercase;}

    /* Trend chart card */
    .trend-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:16px;box-shadow:0 2px 8px var(--shadow);}
    .trend-legend{display:flex;gap:14px;margin-top:10px;}
    .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:2px;}
    .legend-label{font-size:11px;color:var(--text3);}

    /* Summary bars */
    .summary-item{margin-bottom:16px;}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center;}
    .summary-cat{font-size:13px;color:var(--text);font-weight:500;}
    .summary-amt{font-size:13px;font-weight:700;color:var(--red);}
    .bar-bg{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);}
    .bar-pct{font-size:10px;color:var(--text3);margin-top:3px;}

    /* Insight cards */
    .insight-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 4px var(--shadow);display:flex;gap:12px;align-items:flex-start;}
    .insight-emoji{font-size:24px;flex-shrink:0;}
    .insight-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
    .insight-body{font-size:12px;color:var(--text2);line-height:1.6;}

    /* Budget rows */
    .budget-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:8px 16px;box-shadow:0 2px 8px var(--shadow);}
    .budget-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
    .budget-row:last-child{border-bottom:none;}
    .budget-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0;}
    .budget-info{flex:1;}
    .budget-cat{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;}
    .budget-bar-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:3px;}
    .budget-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
    .budget-bar-fill.ok{background:linear-gradient(90deg,var(--green),#7ab88a);}
    .budget-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#e09040);}
    .budget-bar-fill.over{background:linear-gradient(90deg,var(--red),#c07070);}
    .budget-nums{font-size:10px;color:var(--text3);}
    .budget-nums b{font-weight:700;color:var(--text2);}
    .budget-edit{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:4px;flex-shrink:0;}

    /* CSV */
    .csv-btn{flex:none !important;padding:8px 10px !important;font-size:11px !important;}

    /* Toast */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#f7f3ee;font-size:13px;padding:10px 20px;border-radius:50px;z-index:200;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15);}
    .toast.show{opacity:1;}

    .empty{text-align:center;color:var(--text3);padding:48px 0;font-size:14px;}

    /* FAB */
    .fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:200px;padding:14px 0;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:50px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;font-family:inherit;box-shadow:0 8px 28px rgba(139,111,78,.38);letter-spacing:.5px;z-index:10;}

    /* Overlay */
    .overlay{position:fixed;inset:0;background:rgba(58,48,40,.5);display:flex;flex-direction:column;justify-content:flex-end;z-index:100;backdrop-filter:blur(4px);}
    .form-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:28px 24px 48px;border-top:1px solid var(--border);max-height:92vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(100,70,40,.12);}
    .form-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
    .form-title{font-size:17px;font-weight:900;color:var(--text);}
    .form-close{background:var(--bg3);border:none;border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 12px;font-family:inherit;font-size:14px;}
    .type-toggle{display:flex;gap:8px;margin-bottom:20px;}
    .type-btn{flex:1;padding:10px 0;border-radius:10px;border:1px solid transparent;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
    .type-btn.expense.active{background:var(--red-bg);color:var(--red);border-color:#e8c0c0;}
    .type-btn.income.active{background:var(--green-bg);color:var(--green);border-color:#b8ddc4;}
    .type-btn.inactive{background:var(--surface);color:var(--text3);border-color:var(--border);}
    .field-label{font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:1.5px;text-transform:uppercase;}
    .amount-wrap{display:flex;align-items:center;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:0 14px;margin-bottom:16px;box-shadow:0 1px 4px var(--shadow);}
    .amount-yen{color:var(--text3);margin-right:8px;font-size:16px;}
    .amount-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:24px;font-weight:900;padding:14px 0;font-family:inherit;width:100%;}
    .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    .cat-btn{padding:7px 12px;border-radius:8px;border:1px solid transparent;font-family:inherit;font-size:12px;cursor:pointer;}
    .cat-btn.active{background:rgba(139,111,78,.12);color:var(--accent);border-color:rgba(139,111,78,.3);font-weight:700;}
    .cat-btn.inactive{background:var(--surface);color:var(--text2);border-color:var(--border);}
    .text-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px;box-shadow:0 1px 4px var(--shadow);}
    .text-input::placeholder{color:var(--text3);}
    .submit-btn{width:100%;padding:16px 0;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:14px;cursor:pointer;font-size:16px;font-weight:700;color:#fff;font-family:inherit;box-shadow:0 6px 24px rgba(139,111,78,.35);}
  </style>
</head>
<body>
<div class="ambient"></div>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-sub">Household Ledger</div>
        <div class="header-title">家計簿</div>
      </div>
      <div class="header-icon" onclick="switchTab('budget')" title="予算設定">💴</div>
    </div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="balance-card">
      <div class="balance-label">今月の収支</div>
      <div class="balance-amount" id="balanceAmount"></div>
      <div class="balance-row">
        <div><div class="balance-item-label">収入</div><div class="balance-income" id="totalIncome"></div></div>
        <div class="balance-divider"></div>
        <div><div class="balance-item-label">支出</div><div class="balance-expense" id="totalExpense"></div></div>
      </div>
    </div>
    <div class="alert-banner hidden" id="alertBanner">
      <div class="alert-icon">⚠️</div>
      <div>
        <div class="alert-text" id="alertText"></div>
        <div class="alert-sub" id="alertSub"></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn" id="tab-list"    onclick="switchTab('list')">📋 明細</button>
    <button class="tab-btn" id="tab-summary" onclick="switchTab('summary')">📊 集計</button>
    <button class="tab-btn" id="tab-insight" onclick="switchTab('insight')">💡 分析</button>
    <button class="tab-btn" id="tab-budget"  onclick="switchTab('budget')">🎯 予算</button>
    <button class="tab-btn csv-btn" onclick="exportCSV()">💾</button>
  </div>

  <div class="content">
    <div id="view-list"></div>
    <div id="view-summary" style="display:none"></div>
    <div id="view-insight" style="display:none"></div>
    <div id="view-budget"  style="display:none"></div>
  </div>
</div>

<button class="fab" id="fab" onclick="openForm()">＋ 記録する</button>
<div class="toast" id="toast"></div>

<!-- 記録フォーム -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="form-sheet">
    <div class="form-header">
      <div class="form-title">新しい記録</div>
      <button class="form-close" onclick="closeForm()">閉じる</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">💸 支出</button>
      <button class="type-btn income"  id="btn-income"  onclick="setType('income')">💴 収入</button>
    </div>
    <div class="field-label">金額</div>
    <div class="amount-wrap">
      <span class="amount-yen">¥</span>
      <input class="amount-input" type="number" id="inputAmount" placeholder="0" inputmode="numeric" />
    </div>
    <div class="field-label">カテゴリ</div>
    <div class="cats" id="catButtons"></div>
    <div class="field-label">日付</div>
    <input class="text-input" type="date" id="inputDate" />
    <div class="field-label">メモ（任意）</div>
    <input class="text-input" type="text" id="inputMemo" placeholder="例：スーパーで買い物" />
    <button class="submit-btn" onclick="addEntry()">追加する</button>
  </div>
</div>

<!-- 予算フォーム -->
<div class="overlay" id="budgetOverlay" style="display:none" onclick="budgetOverlayClick(event)">
  <div class="form-sheet">
    <div class="form-header">
      <div class="form-title" id="budgetFormTitle">予算を設定</div>
      <button class="form-close" onclick="closeBudgetForm()">閉じる</button>
    </div>
    <div class="field-label">月の予算（0で削除）</div>
    <div class="amount-wrap">
      <span class="amount-yen">¥</span>
      <input class="amount-input" type="number" id="budgetInput" placeholder="0" inputmode="numeric" />
    </div>
    <button class="submit-btn" onclick="saveBudget()">設定する</button>
  </div>
</div>

<script>
const CATS = {
  expense:[
    {id:"food",label:"食費",icon:"🍱"},
    {id:"transport",label:"交通費",icon:"🚃"},
    {id:"utility",label:"光熱費",icon:"💡"},
    {id:"housing",label:"住居費",icon:"🏠"},
    {id:"entertainment",label:"娯楽",icon:"🎮"},
    {id:"clothing",label:"衣類",icon:"👕"},
    {id:"health",label:"医療",icon:"🏥"},
    {id:"other",label:"その他",icon:"📦"},
  ],
  income:[
    {id:"salary",label:"給与",icon:"💼"},
    {id:"bonus",label:"ボーナス",icon:"🎁"},
    {id:"other_income",label:"その他収入",icon:"💰"},
  ],
};
const MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

let entries = JSON.parse(localStorage.getItem("kakeibo_entries")||"[]");
let budgets = JSON.parse(localStorage.getItem("kakeibo_budgets")||"{}");
let now=new Date(), curY=now.getFullYear(), curM=now.getMonth()+1;
let curTab="list", fType="expense", fCat="food", editCat=null;

const save=()=>localStorage.setItem("kakeibo_entries",JSON.stringify(entries));
const saveBudgets=()=>localStorage.setItem("kakeibo_budgets",JSON.stringify(budgets));
const yen=n=>"¥"+Number(n).toLocaleString("ja-JP");
const monthKey=(s,y,m)=>{ const d=new Date(s); return `${d.getFullYear()}-${d.getMonth()+1}`; };
const getKey=(y,m)=>`${y}-${m}`;

function getFiltered(y,m){
  const k=getKey(y||curY,m||curM);
  return entries.filter(e=>monthKey(e.date)===k).sort((a,b)=>new Date(b.date)-new Date(a.date));
}
function totals(list){
  const inc=list.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const exp=list.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  return{inc,exp,bal:inc-exp};
}
function catInfo(type,id){
  return (CATS[type]||CATS.expense).find(c=>c.id===id)||{label:id,icon:"📌"};
}

function render(){
  const fil=getFiltered();
  const {inc,exp,bal}=totals(fil);

  document.getElementById("monthLabel").textContent=`${curY}年 ${MONTHS[curM-1]}`;
  const bel=document.getElementById("balanceAmount");
  bel.textContent=(bal>=0?"+":"")+yen(bal);
  bel.className="balance-amount "+(bal>=0?"positive":"negative");
  document.getElementById("totalIncome").textContent=yen(inc);
  document.getElementById("totalExpense").textContent=yen(exp);

  renderAlert(fil,exp);

  ["list","summary","insight","budget"].forEach(t=>{
    const el=document.getElementById("tab-"+t);
    if(el) el.className="tab-btn"+(curTab===t?" active":"");
  });
  ["list","summary","insight","budget"].forEach(t=>{
    document.getElementById("view-"+t).style.display=curTab===t?"block":"none";
  });

  if(curTab==="list")    renderList(fil);
  if(curTab==="summary") renderSummary(fil,exp);
  if(curTab==="insight") renderInsight();
  if(curTab==="budget")  renderBudget(fil);
}

function renderAlert(fil,totalExp){
  const banner=document.getElementById("alertBanner");
  const expMap={};
  fil.filter(e=>e.type==="expense").forEach(e=>{expMap[e.category]=(expMap[e.category]||0)+e.amount;});

  // Budget over alerts
  for(const [catId,budget] of Object.entries(budgets)){
    if(!budget) continue;
    const spent=expMap[catId]||0;
    const cat=catInfo("expense",catId);
    if(spent>=budget){
      banner.classList.remove("hidden");
      document.getElementById("alertText").textContent=`${cat.icon} ${cat.label}の予算を超過しています`;
      document.getElementById("alertSub").textContent=`予算 ${yen(budget)} に対して ${yen(spent)} 使用`;
      return;
    }
    if(spent>=budget*0.8){
      banner.classList.remove("hidden");
      document.getElementById("alertText").textContent=`${cat.icon} ${cat.label}の予算が残りわずかです`;
      document.getElementById("alertSub").textContent=`残り ${yen(budget-spent)}（予算の${Math.round((1-spent/budget)*100)}%）`;
      return;
    }
  }

  // 20% spike vs last month
  const pm=curM===1?12:curM-1, py=curM===1?curY-1:curY;
  const prevExp=totals(getFiltered(py,pm)).exp;
  if(prevExp>0&&totalExp>prevExp*1.2){
    banner.classList.remove("hidden");
    document.getElementById("alertText").textContent="先月より支出が20%以上増えています";
    document.getElementById("alertSub").textContent=`先月 ${yen(prevExp)} → 今月 ${yen(totalExp)}`;
    return;
  }
  banner.classList.add("hidden");
}

function renderList(fil){
  const expMap={};
  fil.filter(e=>e.type==="expense").forEach(e=>{expMap[e.category]=(expMap[e.category]||0)+e.amount;});
  const topCat=Object.entries(expMap).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const el=document.getElementById("view-list");
  if(!fil.length){el.innerHTML='<div class="empty">この月の記録はありません</div>';return;}
  el.innerHTML=fil.map(e=>{
    const cat=catInfo(e.type,e.category);
    const d=new Date(e.date);
    const isTop=e.type==="expense"&&e.category===topCat;
    return `<div class="entry-item">
      <div class="entry-icon ${e.type}${isTop?" top-cat":""}">${cat.icon}</div>
      <div class="entry-info">
        <div class="entry-cat">${cat.label}${e.memo?`<span class="entry-memo">— ${e.memo}</span>`:""}${isTop?` <span style="font-size:10px;color:var(--accent2)">最多</span>`:""}</div>
        <div class="entry-date">${d.getMonth()+1}/${d.getDate()}</div>
      </div>
      <div class="entry-amount ${e.type}">${e.type==="income"?"+":"-"}${yen(e.amount)}</div>
      <button class="entry-delete" onclick="deleteEntry(${e.id})">✕</button>
    </div>`;
  }).join("");
}

function renderSummary(fil,totalExp){
  const expMap={};
  fil.filter(e=>e.type==="expense").forEach(e=>{expMap[e.category]=(expMap[e.category]||0)+e.amount;});
  const catTotals=Object.entries(expMap).sort((a,b)=>b[1]-a[1]);

  // 6ヶ月トレンド
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(curY,curM-1-i,1);
    const y=d.getFullYear(),m=d.getMonth()+1;
    const t=totals(getFiltered(y,m));
    months.push({label:MONTHS[m-1].replace("月",""),exp:t.exp,inc:t.inc});
  }
  const maxV=Math.max(...months.flatMap(t=>[t.exp,t.inc]),1);
  const W=54, PAD=16, H=72;

  const bars=months.map((t,i)=>{
    const x=PAD+i*W;
    const eh=Math.round((t.exp/maxV)*(H-12));
    const ih=Math.round((t.inc/maxV)*(H-12));
    const isCur=i===5;
    return `
      <rect x="${x}" y="${H-eh}" width="${W*0.38}" height="${eh}" rx="3" fill="${isCur?"#b05a5a":"#e8c0c0"}"/>
      <rect x="${x+W*0.42}" y="${H-ih}" width="${W*0.38}" height="${ih}" rx="3" fill="${isCur?"#5a8a6a":"#b8ddc4"}"/>
      <text x="${x+W*0.38}" y="${H+10}" text-anchor="middle" font-size="9" fill="#b0a494">${t.label}</text>`;
  }).join("");

  const trendHTML=`
    <div class="trend-card">
      <div class="sec-title">過去6ヶ月の推移</div>
      <svg width="100%" viewBox="0 0 ${PAD*2+W*6} ${H+16}" style="overflow:visible">
        ${bars}
      </svg>
      <div class="trend-legend">
        <div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:#b05a5a"></div><span class="legend-label">支出</span></div>
        <div style="display:flex;align-items:center;gap:5px"><div class="legend-dot" style="background:#5a8a6a"></div><span class="legend-label">収入</span></div>
      </div>
    </div>`;

  let catHTML=`<div class="sec-title">支出カテゴリ別</div>`;
  if(!catTotals.length){catHTML+='<div class="empty">支出がありません</div>';}
  else catHTML+=catTotals.map(([id,amt])=>{
    const cat=catInfo("expense",id);
    const pct=totalExp>0?amt/totalExp*100:0;
    const bud=budgets[id];
    const over=bud&&amt>bud;
    return `<div class="summary-item">
      <div class="summary-row">
        <span class="summary-cat">${cat.icon} ${cat.label}</span>
        <span class="summary-amt" style="${over?"color:var(--red)":""}">${yen(amt)}${bud?` <span style="font-size:10px;color:var(--text3);font-weight:400">/ ${yen(bud)}</span>`:""}</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="bar-pct">${pct.toFixed(1)}%${over?" ⚠️ 予算超過":""}</div>
    </div>`;
  }).join("");

  document.getElementById("view-summary").innerHTML=trendHTML+catHTML;
}

function renderInsight(){
  const fil=getFiltered();
  const {inc,exp,bal}=totals(fil);
  const pm=curM===1?12:curM-1, py=curM===1?curY-1:curY;
  const prev=totals(getFiltered(py,pm));
  const expMap={},prevExpMap={};
  fil.filter(e=>e.type==="expense").forEach(e=>{expMap[e.category]=(expMap[e.category]||0)+e.amount;});
  getFiltered(py,pm).filter(e=>e.type==="expense").forEach(e=>{prevExpMap[e.category]=(prevExpMap[e.category]||0)+e.amount;});
  const topEntries=Object.entries(expMap).sort((a,b)=>b[1]-a[1]);

  const cards=[];

  // 最多カテゴリ
  if(topEntries.length){
    const [tid,tamt]=topEntries[0];
    const cat=catInfo("expense",tid);
    const pct=exp>0?Math.round(tamt/exp*100):0;
    cards.push({e:cat.icon,t:`${cat.label}が今月の支出の${pct}%`,b:`今月の支出 ${yen(exp)} のうち、${cat.label}が ${yen(tamt)} を占めています。`});
  }

  // 先月比
  if(prev.exp>0){
    const diff=exp-prev.exp;
    const pct=Math.abs(Math.round(diff/prev.exp*100));
    if(diff>0) cards.push({e:"📈",t:`先月より支出が${pct}%増加`,b:`先月 ${yen(prev.exp)} → 今月 ${yen(exp)}。差額 ${yen(diff)} です。`});
    else if(diff<0) cards.push({e:"📉",t:`先月より支出が${pct}%減少！`,b:`先月 ${yen(prev.exp)} → 今月 ${yen(exp)}。${yen(-diff)} の節約です。`});
    else cards.push({e:"➡️",t:"先月とほぼ同じ支出",b:`今月・先月ともに ${yen(exp)} です。`});
  }

  // 最も増えたカテゴリ
  const deltas=CATS.expense.map(c=>({c,d:(expMap[c.id]||0)-(prevExpMap[c.id]||0),prev:prevExpMap[c.id]||0}))
    .filter(x=>x.d>0&&x.prev>0).sort((a,b)=>b.d-a.d);
  if(deltas.length){
    const {c,d}=deltas[0];
    cards.push({e:"🔍",t:`${c.label}の増加が目立ちます`,b:`先月より ${yen(d)} 増えて ${yen(expMap[c.id])} になっています。`});
  }

  // 貯蓄率
  if(inc>0){
    const rate=Math.round(bal/inc*100);
    if(rate>=20) cards.push({e:"🌿",t:`貯蓄率 ${rate}% — 素晴らしい！`,b:`収入 ${yen(inc)} のうち ${yen(bal)} を残せています。`});
    else if(rate>0) cards.push({e:"🌱",t:`貯蓄率 ${rate}%`,b:"もう少し節約できると理想的です。支出の見直しを検討してみましょう。"});
    else cards.push({e:"🌧️",t:"今月は赤字です",b:`収入を ${yen(-bal)} 上回っています。来月は節約を意識してみましょう。`});
  }

  const el=document.getElementById("view-insight");
  if(!cards.length){el.innerHTML='<div class="empty">記録が増えると分析が表示されます</div>';return;}
  el.innerHTML=`<div class="sec-title" style="margin-bottom:16px">今月のインサイト</div>`+
    cards.map(c=>`<div class="insight-card">
      <div class="insight-emoji">${c.e}</div>
      <div><div class="insight-title">${c.t}</div><div class="insight-body">${c.b}</div></div>
    </div>`).join("");
}

function renderBudget(fil){
  const fil2=fil||getFiltered();
  const expMap={};
  fil2.filter(e=>e.type==="expense").forEach(e=>{expMap[e.category]=(expMap[e.category]||0)+e.amount;});
  document.getElementById("view-budget").innerHTML=
    `<div class="sec-title" style="margin-bottom:14px">カテゴリ別予算管理</div>
    <div class="budget-card">`+
    CATS.expense.map(cat=>{
      const bud=budgets[cat.id]||0;
      const spent=expMap[cat.id]||0;
      const pct=bud>0?Math.min(spent/bud*100,100):0;
      const cls=!bud?"ok":spent>=bud?"over":spent>=bud*0.8?"warn":"ok";
      return `<div class="budget-row">
        <div class="budget-icon">${cat.icon}</div>
        <div class="budget-info">
          <div class="budget-cat">${cat.label}</div>
          ${bud?`<div class="budget-bar-bg"><div class="budget-bar-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="budget-nums"><b>${yen(spent)}</b> / ${yen(bud)}</div>`
          :`<div class="budget-nums" style="color:var(--text3)">未設定</div>`}
        </div>
        <button class="budget-edit" onclick="openBudgetForm('${cat.id}')">✏️</button>
      </div>`;
    }).join("")+`</div>`;
}

// Budget form
function openBudgetForm(catId){
  editCat=catId;
  const cat=catInfo("expense",catId);
  document.getElementById("budgetFormTitle").textContent=`${cat.icon} ${cat.label}の予算`;
  document.getElementById("budgetInput").value=budgets[catId]||"";
  document.getElementById("budgetOverlay").style.display="flex";
}
function closeBudgetForm(){document.getElementById("budgetOverlay").style.display="none";}
function budgetOverlayClick(e){if(e.target===document.getElementById("budgetOverlay"))closeBudgetForm();}
function saveBudget(){
  const v=Number(document.getElementById("budgetInput").value);
  if(v>0) budgets[editCat]=v; else delete budgets[editCat];
  saveBudgets(); closeBudgetForm(); render(); showToast("予算を設定しました");
}

// Misc
function changeMonth(d){const nd=new Date(curY,curM-1+d,1);curY=nd.getFullYear();curM=nd.getMonth()+1;render();}
function switchTab(t){curTab=t;render();}
function deleteEntry(id){entries=entries.filter(e=>e.id!==id);save();render();}

function openForm(){
  document.getElementById("inputDate").value=new Date().toISOString().split("T")[0];
  document.getElementById("inputAmount").value="";
  document.getElementById("inputMemo").value="";
  setType("expense");
  document.getElementById("overlay").style.display="flex";
  document.getElementById("fab").style.display="none";
  setTimeout(()=>document.getElementById("inputAmount").focus(),100);
}
function closeForm(){document.getElementById("overlay").style.display="none";document.getElementById("fab").style.display="block";}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeForm();}
function setType(t){
  fType=t;fCat=CATS[t][0].id;
  document.getElementById("btn-expense").className="type-btn expense "+(t==="expense"?"active":"inactive");
  document.getElementById("btn-income").className="type-btn income "+(t==="income"?"active":"inactive");
  renderCats();
}
function renderCats(){
  document.getElementById("catButtons").innerHTML=CATS[fType].map(c=>
    `<button class="cat-btn ${c.id===fCat?"active":"inactive"}" onclick="selectCat('${c.id}')">${c.icon} ${c.label}</button>`
  ).join("");
}
function selectCat(id){fCat=id;renderCats();}
function addEntry(){
  const amt=Number(document.getElementById("inputAmount").value);
  if(!amt||amt<=0){document.getElementById("inputAmount").focus();return;}
  const date=document.getElementById("inputDate").value;
  entries.push({id:Date.now(),type:fType,category:fCat,amount:amt,date,memo:document.getElementById("inputMemo").value.trim()});
  save();closeForm();
  const d=new Date(date);curY=d.getFullYear();curM=d.getMonth()+1;curTab="list";render();
}
function showToast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2500);
}
function exportCSV(){
  const fil=getFiltered();
  if(!fil.length){showToast("この月の記録がありません");return;}
  const rows=fil.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>{
    const cat=catInfo(e.type,e.category);
    return ["日付","種別","カテゴリ","金額","メモ"].map((_,i)=>{
      const v=[e.date,e.type==="income"?"収入":"支出",cat.label,e.amount,e.memo||""][i];
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(",");
  });
  const csv="\uFEFF"+['"日付","種別","カテゴリ","金額","メモ"',...rows].join("\r\n");
  const a=Object.assign(document.createElement("a"),{
    href:URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})),
    download:`家計簿_${curY}年${MONTHS[curM-1]}.csv`
  });
  a.click();
  showToast(`📥 ${curY}年${MONTHS[curM-1]}をダウンロードしました`);
}

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
render();
</script>

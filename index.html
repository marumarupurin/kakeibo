<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>家計簿</title>
  <meta name="theme-color" content="#f7f3ee" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家計簿" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');

    :root {
      --bg:        #f7f3ee;
      --bg2:       #f0ebe3;
      --bg3:       #e8e0d4;
      --surface:   #ffffff;
      --border:    #ddd6cb;
      --text:      #3a3028;
      --text2:     #7a6e62;
      --text3:     #b0a494;
      --accent:    #8b6f4e;
      --accent2:   #c4956a;
      --green:     #5a8a6a;
      --green-bg:  #eaf3ec;
      --red:       #b05a5a;
      --red-bg:    #f8edec;
      --shadow:    rgba(100,70,40,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      max-width: 420px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input { -webkit-appearance: none; }
    button { -webkit-appearance: none; }

    /* Ambient */
    .ambient {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 15% 10%, rgba(180,140,90,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(120,160,110,0.06) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .app { position: relative; z-index: 1; }

    /* Header */
    .header { padding: 52px 24px 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .header-sub { font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
    .header-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
    .header-icon {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 4px 16px rgba(139,111,78,0.25);
    }

    /* Month selector */
    .month-selector {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 20px; padding: 10px 16px;
      background: var(--surface);
      border-radius: 14px; border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
    }
    .month-btn {
      background: none; border: none; color: var(--text3);
      font-size: 22px; cursor: pointer; padding: 4px 8px; line-height: 1;
    }
    .month-label { font-size: 15px; font-weight: 700; color: var(--text); }

    /* Balance card */
    .balance-card {
      margin-top: 16px; padding: 22px;
      background: linear-gradient(135deg, var(--accent) 0%, #6b4f35 100%);
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(139,111,78,0.28);
    }
    .balance-label { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 8px; }
    .balance-amount { font-size: 34px; font-weight: 900; letter-spacing: -1px; color: #fff; }
    .balance-amount.positive { color: #c8f0d4; }
    .balance-amount.negative { color: #ffc8c8; }
    .balance-row { display: flex; gap: 20px; margin-top: 14px; }
    .balance-divider { width: 1px; background: rgba(255,255,255,0.2); }
    .balance-item-label { font-size: 10px; color: rgba(255,255,255,0.55); margin-bottom: 3px; }
    .balance-income { font-size: 15px; font-weight: 700; color: #c8f0d4; }
    .balance-expense { font-size: 15px; font-weight: 700; color: #ffc8c8; }

    /* Tabs */
    .tabs { display: flex; padding: 16px 24px 0; gap: 8px; }
    .tab-btn {
      flex: 1; padding: 9px 0; border-radius: 10px; border: none;
      font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      background: rgba(139,111,78,0.12); color: var(--accent);
      font-weight: 700; border-bottom: 2px solid var(--accent);
    }
    .tab-btn.inactive { background: var(--surface); color: var(--text3); border: 1px solid var(--border); }

    /* Content */
    .content { padding: 16px 24px 120px; }

    /* Entry item */
    .entry-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; margin-bottom: 8px;
      background: var(--surface);
      border-radius: 14px; border: 1px solid var(--border);
      box-shadow: 0 1px 4px var(--shadow);
    }
    .entry-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .entry-icon.income { background: var(--green-bg); }
    .entry-icon.expense { background: var(--red-bg); }
    .entry-info { flex: 1; min-width: 0; }
    .entry-cat { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .entry-memo { font-size: 11px; color: var(--text3); margin-left: 6px; font-weight: 400; }
    .entry-date { font-size: 11px; color: var(--text3); }
    .entry-amount { font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .entry-amount.income { color: var(--green); }
    .entry-amount.expense { color: var(--red); }
    .entry-delete {
      background: none; border: none; color: var(--border);
      cursor: pointer; font-size: 15px; padding: 0 0 0 4px; flex-shrink: 0;
    }

    /* Summary */
    .summary-label { font-size: 11px; color: var(--text3); margin-bottom: 12px; letter-spacing: 1px; }
    .summary-item { margin-bottom: 16px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .summary-cat { font-size: 13px; color: var(--text); font-weight: 500; }
    .summary-amt { font-size: 13px; font-weight: 700; color: var(--red); }
    .bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px; transition: width 0.6s ease;
    }
    .bar-pct { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* CSV btn */
    .csv-btn { flex: none !important; padding: 9px 14px !important; color: var(--text3); }
    .csv-btn:active { background: var(--green-bg) !important; color: var(--green) !important; }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #f7f3ee;
      font-size: 13px; padding: 10px 20px;
      border-radius: 50px; z-index: 200; white-space: nowrap;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; }

    /* Empty */
    .empty { text-align: center; color: var(--text3); padding: 48px 0; font-size: 14px; }

    /* FAB */
    .fab {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      width: 200px; padding: 14px 0;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
      border: none; border-radius: 50px; cursor: pointer;
      font-size: 15px; font-weight: 700; color: #fff;
      font-family: inherit;
      box-shadow: 0 8px 28px rgba(139,111,78,0.38);
      letter-spacing: 0.5px; z-index: 10;
    }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(58,48,40,0.5);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .form-sheet {
      background: var(--bg);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 48px;
      border-top: 1px solid var(--border);
      max-height: 92vh; overflow-y: auto;
      box-shadow: 0 -8px 32px rgba(100,70,40,0.12);
    }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .form-title { font-size: 17px; font-weight: 900; color: var(--text); }
    .form-close {
      background: var(--bg3); border: none; border-radius: 8px;
      color: var(--text2); cursor: pointer; padding: 6px 12px; font-family: inherit; font-size: 14px;
    }
    .type-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .type-btn {
      flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid transparent;
      font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .type-btn.expense.active { background: var(--red-bg); color: var(--red); border-color: #e8c0c0; }
    .type-btn.income.active { background: var(--green-bg); color: var(--green); border-color: #b8ddc4; }
    .type-btn.inactive { background: var(--surface); color: var(--text3); border-color: var(--border); }
    .field-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 1.5px; text-transform: uppercase; }
    .amount-wrap {
      display: flex; align-items: center;
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border); padding: 0 14px; margin-bottom: 16px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .amount-yen { color: var(--text3); margin-right: 8px; font-size: 16px; }
    .amount-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 24px; font-weight: 900;
      padding: 14px 0; font-family: inherit; width: 100%;
    }
    .cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cat-btn {
      padding: 7px 12px; border-radius: 8px; border: 1px solid transparent;
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    .cat-btn.active { background: rgba(139,111,78,0.12); color: var(--accent); border-color: rgba(139,111,78,0.3); font-weight: 700; }
    .cat-btn.inactive { background: var(--surface); color: var(--text2); border-color: var(--border); }
    .text-input {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
      color: var(--text); font-size: 14px; font-family: inherit; outline: none;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .text-input::placeholder { color: #4a4038; }
    .submit-btn {
      width: 100%; padding: 16px 0;
      background: linear-gradient(135deg, #f5c842 0%, #e8853a 100%);
      border: none; border-radius: 14px; cursor: pointer;
      font-size: 16px; font-weight: 700; color: #1a1208;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(245,200,66,0.35);
    }
  </style>
</head>
<body>
<div class="ambient"></div>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-sub">Household Ledger</div>
        <div class="header-title">家計簿</div>
      </div>
      <div class="header-icon">💴</div>
    </div>
    <div class="month-selector">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="balance-card">
      <div class="balance-label">今月の収支</div>
      <div class="balance-amount" id="balanceAmount"></div>
      <div class="balance-row">
        <div>
          <div class="balance-item-label">収入</div>
          <div class="balance-income" id="totalIncome"></div>
        </div>
        <div class="balance-divider"></div>
        <div>
          <div class="balance-item-label">支出</div>
          <div class="balance-expense" id="totalExpense"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn" id="tab-list" onclick="switchTab('list')">📋 明細</button>
    <button class="tab-btn" id="tab-summary" onclick="switchTab('summary')">📊 集計</button>
    <button class="tab-btn inactive csv-btn" onclick="exportCSV()" title="CSVダウンロード">💾 CSV</button>
  </div>

  <!-- Content -->
  <div class="content">
    <div id="view-list"></div>
    <div id="view-summary" style="display:none"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openForm()">＋ 記録する</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Add form overlay -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="form-sheet">
    <div class="form-header">
      <div class="form-title">新しい記録</div>
      <button class="form-close" onclick="closeForm()">閉じる</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">💸 支出</button>
      <button class="type-btn income" id="btn-income" onclick="setType('income')">💴 収入</button>
    </div>
    <div class="field-label">金額</div>
    <div class="amount-wrap">
      <span class="amount-yen">¥</span>
      <input class="amount-input" type="number" id="inputAmount" placeholder="0" inputmode="numeric" />
    </div>
    <div class="field-label">カテゴリ</div>
    <div class="cats" id="catButtons"></div>
    <div class="field-label">日付</div>
    <input class="text-input" type="date" id="inputDate" />
    <div class="field-label">メモ（任意）</div>
    <input class="text-input" type="text" id="inputMemo" placeholder="例：スーパーで買い物" />
    <button class="submit-btn" onclick="addEntry()">追加する</button>
  </div>
</div>

<script>
const CATEGORIES = {
  expense: [
    { id: "food",          label: "食費",   icon: "🍱" },
    { id: "transport",     label: "交通費", icon: "🚃" },
    { id: "utility",       label: "光熱費", icon: "💡" },
    { id: "housing",       label: "住居費", icon: "🏠" },
    { id: "entertainment", label: "娯楽",   icon: "🎮" },
    { id: "clothing",      label: "衣類",   icon: "👕" },
    { id: "health",        label: "医療",   icon: "🏥" },
    { id: "other",         label: "その他", icon: "📦" },
  ],
  income: [
    { id: "salary",       label: "給与",       icon: "💼" },
    { id: "bonus",        label: "ボーナス",   icon: "🎁" },
    { id: "other_income", label: "その他収入", icon: "💰" },
  ],
};
const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

// State
let entries = JSON.parse(localStorage.getItem("kakeibo_entries") || "[]");
let currentDate = new Date();
let currentYear = currentDate.getFullYear();
let currentMonth = currentDate.getMonth() + 1;
let currentTab = "list";
let formType = "expense";
let formCategory = "food";

function save() {
  localStorage.setItem("kakeibo_entries", JSON.stringify(entries));
}

function formatYen(n) {
  return "¥" + Number(n).toLocaleString("ja-JP");
}

function getMonthKey(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${d.getMonth() + 1}`;
}

function getFiltered() {
  const key = `${currentYear}-${currentMonth}`;
  return entries.filter(e => getMonthKey(e.date) === key)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getTotals(filtered) {
  const income  = filtered.filter(e => e.type === "income").reduce((s, e) => s + e.amount, 0);
  const expense = filtered.filter(e => e.type === "expense").reduce((s, e) => s + e.amount, 0);
  return { income, expense, balance: income - expense };
}

function getCatInfo(type, id) {
  const list = type === "income" ? CATEGORIES.income : CATEGORIES.expense;
  return list.find(c => c.id === id) || { label: id, icon: "📌" };
}

function render() {
  const filtered = getFiltered();
  const totals = getTotals(filtered);

  // Header
  document.getElementById("monthLabel").textContent = `${currentYear}年 ${MONTHS[currentMonth - 1]}`;
  const balEl = document.getElementById("balanceAmount");
  balEl.textContent = (totals.balance >= 0 ? "+" : "") + formatYen(totals.balance);
  balEl.className = "balance-amount " + (totals.balance >= 0 ? "positive" : "negative");
  document.getElementById("totalIncome").textContent = formatYen(totals.income);
  document.getElementById("totalExpense").textContent = formatYen(totals.expense);

  // Tabs
  document.getElementById("tab-list").className = "tab-btn " + (currentTab === "list" ? "active" : "inactive");
  document.getElementById("tab-summary").className = "tab-btn " + (currentTab === "summary" ? "active" : "inactive");

  // List view
  const listEl = document.getElementById("view-list");
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty">この月の記録はありません</div>';
  } else {
    listEl.innerHTML = filtered.map(e => {
      const cat = getCatInfo(e.type, e.category);
      const d = new Date(e.date);
      const sign = e.type === "income" ? "+" : "-";
      return `
        <div class="entry-item">
          <div class="entry-icon ${e.type}">${cat.icon}</div>
          <div class="entry-info">
            <div class="entry-cat">${cat.label}${e.memo ? `<span class="entry-memo">— ${e.memo}</span>` : ""}</div>
            <div class="entry-date">${d.getMonth()+1}/${d.getDate()}</div>
          </div>
          <div class="entry-amount ${e.type}">${sign}${formatYen(e.amount)}</div>
          <button class="entry-delete" onclick="deleteEntry(${e.id})">✕</button>
        </div>`;
    }).join("");
  }

  // Summary view
  const summaryEl = document.getElementById("view-summary");
  const expMap = {};
  filtered.filter(e => e.type === "expense").forEach(e => {
    expMap[e.category] = (expMap[e.category] || 0) + e.amount;
  });
  const catTotals = Object.entries(expMap).sort((a,b) => b[1] - a[1]);
  if (catTotals.length === 0) {
    summaryEl.innerHTML = '<div class="empty">この月の支出記録はありません</div>';
  } else {
    summaryEl.innerHTML = '<div class="summary-label">支出カテゴリ別</div>' +
      catTotals.map(([catId, amount]) => {
        const cat = getCatInfo("expense", catId);
        const pct = totals.expense > 0 ? (amount / totals.expense * 100) : 0;
        return `
          <div class="summary-item">
            <div class="summary-row">
              <span class="summary-cat">${cat.icon} ${cat.label}</span>
              <span class="summary-amt">${formatYen(amount)}</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-pct">${pct.toFixed(1)}%</div>
          </div>`;
      }).join("");
  }

  // Show/hide views
  document.getElementById("view-list").style.display = currentTab === "list" ? "block" : "none";
  document.getElementById("view-summary").style.display = currentTab === "summary" ? "block" : "none";
}

function changeMonth(delta) {
  const d = new Date(currentYear, currentMonth - 1 + delta, 1);
  currentYear = d.getFullYear();
  currentMonth = d.getMonth() + 1;
  render();
}

function switchTab(tab) {
  currentTab = tab;
  render();
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

// Form
function openForm() {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("inputDate").value = today;
  document.getElementById("inputAmount").value = "";
  document.getElementById("inputMemo").value = "";
  setType("expense");
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("fab").style.display = "none";
  setTimeout(() => document.getElementById("inputAmount").focus(), 100);
}

function closeForm() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("fab").style.display = "block";
}

function overlayClick(e) {
  if (e.target === document.getElementById("overlay")) closeForm();
}

function setType(type) {
  formType = type;
  formCategory = CATEGORIES[type][0].id;
  document.getElementById("btn-expense").className = "type-btn expense " + (type === "expense" ? "active" : "inactive");
  document.getElementById("btn-income").className = "type-btn income " + (type === "income" ? "active" : "inactive");
  renderCatButtons();
}

function renderCatButtons() {
  const el = document.getElementById("catButtons");
  el.innerHTML = CATEGORIES[formType].map(cat => `
    <button class="cat-btn ${cat.id === formCategory ? "active" : "inactive"}"
      onclick="selectCat('${cat.id}')">${cat.icon} ${cat.label}</button>
  `).join("");
}

function selectCat(id) {
  formCategory = id;
  renderCatButtons();
}

function addEntry() {
  const amount = Number(document.getElementById("inputAmount").value);
  if (!amount || isNaN(amount) || amount <= 0) {
    document.getElementById("inputAmount").focus();
    return;
  }
  const date = document.getElementById("inputDate").value;
  const memo = document.getElementById("inputMemo").value.trim();
  entries.push({ id: Date.now(), type: formType, category: formCategory, amount, date, memo });
  save();
  closeForm();
  // 追加した月に移動
  const d = new Date(date);
  currentYear = d.getFullYear();
  currentMonth = d.getMonth() + 1;
  currentTab = "list";
  render();
}

// Toast
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

// CSV export — 今表示中の月のデータ
function exportCSV() {
  const filtered = getFiltered();
  if (filtered.length === 0) {
    showToast("この月の記録がありません");
    return;
  }
  const header = ["日付", "種別", "カテゴリ", "金額", "メモ"];
  const rows = filtered
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .map(e => {
      const cat = getCatInfo(e.type, e.category);
      return [
        e.date,
        e.type === "income" ? "収入" : "支出",
        cat.label,
        e.amount,
        e.memo || "",
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(",");
    });

  const bom = "\uFEFF"; // Excel文字化け防止
  const csv = bom + [header.join(","), ...rows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `家計簿_${currentYear}年${MONTHS[currentMonth - 1]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`📥 ${currentYear}年${MONTHS[currentMonth-1]}をダウンロードしました`);
}

// PWA Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// Init
render();
</script>
</body>
</html>
